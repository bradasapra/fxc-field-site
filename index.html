<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#101114" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="./icon.svg" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FXC Field" />
<title>FX Coating — Project Dashboard</title>
<style>
  :root{
    /* FX brand (Style Guide): graphite grays + the logo's layer gradient */
    --bg:#101114; --panel:#17181c; --panel2:#1d1f24; --line:#2b2d33;
    --ink:#ecedef; --ink-dim:#9b9da2; --ink-faint:#6f7177;
    --fx-red:#DD5061; --fx-magenta:#AB5491; --fx-purple:#7A5896;
    --accent:var(--fx-magenta); --accent-dim:var(--fx-purple);
    --accent-grad:linear-gradient(135deg,var(--fx-red),var(--fx-magenta),var(--fx-purple));
    --accent-grad-h:linear-gradient(90deg,var(--fx-red),var(--fx-magenta),var(--fx-purple));
    --green:#3fb950; --blue:#3a8fd6; --red:#e5534b; --amber:#e3a008; --grey:#6b7884; --purple:#a371f7;
    --radius:12px; --shadow:0 1px 0 rgba(255,255,255,.03), 0 8px 24px rgba(0,0,0,.35);
  }
  /* LIGHT THEME — "lab white" holo-glass (?theme=light, persisted) */
  body.theme-light{
    --bg:#edeff3; --panel:rgba(255,255,255,.66); --panel2:rgba(255,255,255,.85); --line:rgba(90,89,92,.22);
    --ink:#26272b; --ink-dim:#5a595c; --ink-faint:#8d8f94;
    --shadow:0 1px 0 rgba(255,255,255,.65), 0 10px 30px rgba(90,89,92,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  /* HOLO-GLASS: iridescent brand-color glows behind translucent, blurred surfaces */
  body::before{
    content:"";position:fixed;inset:-25%;z-index:-1;pointer-events:none;
    background:
      radial-gradient(640px 420px at 12% 8%,  rgba(221,80,97,.17),  transparent 65%),
      radial-gradient(720px 520px at 88% 16%, rgba(122,88,150,.21), transparent 65%),
      radial-gradient(900px 640px at 45% 96%, rgba(171,84,145,.16), transparent 65%);
    filter:blur(46px) saturate(1.25);
  }
  body.theme-light::before{
    background:
      radial-gradient(640px 420px at 12% 8%,  rgba(221,80,97,.38),  transparent 65%),
      radial-gradient(720px 520px at 88% 16%, rgba(122,88,150,.42), transparent 65%),
      radial-gradient(900px 640px at 45% 96%, rgba(171,84,145,.34), transparent 65%),
      radial-gradient(520px 380px at 60% 40%, rgba(221,80,97,.14),  transparent 70%);
    filter:blur(52px) saturate(1.45);
    animation:holoDrift 36s ease-in-out infinite alternate;
  }
  /* holographic-foil sheen over the whole backdrop (light theme) */
  body.theme-light::after{
    content:"";position:fixed;inset:-30%;z-index:-1;pointer-events:none;opacity:.10;
    background:conic-gradient(from 210deg at 55% 45%, #DD5061, #AB5491, #7A5896, #3a8fd6, #AB5491, #DD5061);
    filter:blur(80px) saturate(1.4);
    animation:holoDrift 48s ease-in-out infinite alternate-reverse;
  }
  @keyframes holoDrift{
    0%  {transform:translate(0,0) rotate(0deg) scale(1)}
    100%{transform:translate(4%, -3%) rotate(8deg) scale(1.12)}
  }
  body .col{background:rgba(23,24,28,.55);backdrop-filter:blur(14px) saturate(1.15);-webkit-backdrop-filter:blur(14px) saturate(1.15)}
  body .card{background:rgba(29,31,36,.74)}
  body .drawer{background:rgba(23,24,28,.88);backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2)}
  body .fxc-sheet{background:rgba(23,24,28,.9);backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2)}
  body.theme-light .col{background:rgba(255,255,255,.48)}
  body.theme-light .card{background:rgba(255,255,255,.8)}
  body.theme-light .drawer{background:rgba(255,255,255,.9)}
  body.theme-light .fxc-sheet{background:rgba(255,255,255,.92)}
  body.theme-light header.top{background:rgba(255,255,255,.55);border-bottom:1px solid var(--line)}
  body.theme-light .chip{background:rgba(255,255,255,.75)}
  body.theme-light .bar{background:rgba(90,89,92,.16)}
  body.theme-light .photoph{background:rgba(90,89,92,.08)}
  body.theme-light .grip:hover,body.theme-light .movebtn:hover{background:rgba(0,0,0,.07)}
  body.theme-light .pending{background:#fff6e2;border-color:#eedfb7;color:#6b4e00}
  body.theme-light .pending .ph{color:#3c2d02}
  body.theme-light .pending button{border-color:#d9b75e;color:#6b4e00}
  body.theme-light .watch li{background:#fff6e2;border-color:#eedfb7;color:#6b4e00}
  body.theme-light .cond{background:#eef4fb;color:#3c5570}
  body.theme-light .datechip.over{color:#8f1f18;background:rgba(229,83,75,.14);border-color:rgba(229,83,75,.35)}
  body.theme-light .datechip.done{color:#155c24;background:rgba(63,185,80,.16);border-color:rgba(63,185,80,.35)}
  body.theme-light .cell.pad{background:transparent}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

  header.top{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,#12171b 0%,#12171bee 100%);
    border-bottom:1px solid var(--line); backdrop-filter:blur(6px);
    padding:14px 18px;
  }
  .brand{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{font-weight:800;letter-spacing:.5px;font-size:18px;display:flex;align-items:center;gap:10px}
  .logo svg{flex:none}
  .logo .wordmark{letter-spacing:2.5px;font-weight:800}
  .logo .sub{color:var(--ink-faint);font-weight:600;font-size:13px;letter-spacing:.4px}
  .spacer{flex:1}
  .kpis{display:flex;gap:10px;flex-wrap:wrap}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 11px;display:flex;flex-direction:column;line-height:1.15;min-width:64px}
  .kpi b{font-size:17px}
  .kpi span{font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.6px}

  nav.tabs{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
  .tab{background:transparent;border:1px solid var(--line);color:var(--ink-dim);padding:7px 15px;border-radius:999px;cursor:pointer;font-size:13.5px;font-weight:600}
  .tab.active{background:var(--accent-grad);border-color:transparent;color:#fff}

  main{padding:18px;max-width:1320px;margin:0 auto}

  /* COLUMNS (board + closeout) */
  .cols{display:grid;gap:14px}
  .cols.b5{grid-template-columns:repeat(5,1fr)}
  .cols.b6{grid-template-columns:repeat(6,1fr)}
  .cols.b4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:1200px){.cols.b5{grid-template-columns:repeat(3,1fr)}.cols.b6{grid-template-columns:repeat(3,1fr)}.cols.b4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:760px){.cols.b5{grid-template-columns:repeat(2,1fr)}.cols.b6{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.cols.b5,.cols.b6,.cols.b4{grid-template-columns:1fr}}
  /* roster (booked, not yet packaging) */
  .cols.b5.with-roster{grid-template-columns:minmax(150px,.55fr) repeat(5,1fr)}
  @media(max-width:1200px){.cols.b5.with-roster{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:760px){.cols.b5.with-roster{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.cols.b5.with-roster{grid-template-columns:1fr}}
  .ros-row{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 9px;margin-bottom:7px;cursor:pointer;line-height:1.45}
  .ros-row:hover{border-color:var(--accent)}
  .rr-no{display:block;color:var(--ink-faint);font-weight:700;font-size:10.5px}
  .rr-name{display:block;font-weight:700;font-size:12.5px}
  .rr-meta{display:block;color:var(--ink-faint);font-size:10.5px}
  .rr-gate{display:block;color:var(--amber);font-size:10.5px;font-weight:600;margin-top:3px}
  .rr-gate.ok{color:var(--green)}
  .rr-go{display:block;width:100%;margin-top:6px;padding:6px 8px;font-size:11px;font-weight:700;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink);cursor:pointer}
  .rr-go:hover{border-color:var(--accent)}
  .ros-tgl{margin-left:6px;color:var(--ink-faint)}
  /* board columns: never let inner content (e.g. the Σ box's table) blow the
     column past its grid share — grid's default min-width:auto does exactly that */
  .cols > .col{min-width:0}
  /* Σ material roll-up under Upcoming */
  .mat-sum{margin-top:10px;border:1px solid var(--line);border-left:3px solid var(--fx-purple,#7A5896);border-radius:9px;background:var(--panel2);font-size:12px}
  .mat-sum table{table-layout:fixed}
  .mat-sum td{overflow-wrap:break-word}
  .mat-sum .msq{width:84px}
  .mat-sum summary{cursor:pointer;padding:9px 11px;font-weight:700;color:var(--ink)}
  .mat-sum .ms-n{float:right;color:var(--ink-faint);font-weight:600;font-size:11px}
  .mat-sum table{width:100%;border-collapse:collapse;margin:0}
  .mat-sum td{padding:6px 11px;border-top:1px solid var(--line);color:var(--ink)}
  .mat-sum .msq{text-align:right;white-space:nowrap}
  .mat-sum .ms-per td{padding:0 11px 7px;border-top:0;font-size:10.5px;color:var(--ink-faint)}
  .ms-empty{color:var(--ink-faint);font-style:italic}
  .ms-flag{padding:6px 11px;color:#a05a00;background:rgba(227,160,8,.12);border-top:1px solid var(--line);font-size:11px;font-weight:600}
  .ms-note{padding:7px 11px;color:var(--ink-faint);font-size:10.5px;border-top:1px solid var(--line)}
  /* pipeline (proven-process map) */
  .pl-link{border-left:2px dashed var(--line);margin:0 0 0 14px;padding:7px 0 7px 12px;font-size:10.5px;color:var(--amber);line-height:1.45}
  .pl-node{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .pl-chip{background:var(--accent-grad);color:#fff;border-radius:999px;padding:2px 9px;font-size:10.5px;font-weight:800;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none}
  .pl-chip.hold{background:var(--amber);color:#221a05}
  .pl-chip .ini{opacity:.8}
  .pl-chip.dragging{opacity:.35}
  .pl-node.drop-target{outline:2px dashed var(--accent);outline-offset:-3px;background:#1a2129}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:90px;transition:background .12s,outline-color .12s}
  .col h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-dim);display:flex;align-items:center;gap:8px}
  .col h3 .dot{width:9px;height:9px;border-radius:50%}
  .col .count{margin-left:auto;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:1px 8px;font-size:11px;color:var(--ink-dim)}
  .col.drop-target{outline:2px dashed var(--accent);outline-offset:-3px;background:#1a2129}
  .empty{color:var(--ink-faint);font-size:12px;font-style:italic;padding:12px 4px;text-align:center}

  .card{position:relative;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px;padding-right:30px;margin-bottom:10px;cursor:pointer;user-select:none;transition:border-color .12s,transform .12s}
  .card:hover{border-color:var(--accent-dim);transform:translateY(-1px)}
  .card:last-child{margin-bottom:0}
  .card.dragging{opacity:.35}
  .grip{position:absolute;top:6px;right:4px;width:24px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:15px;cursor:grab;border-radius:6px;touch-action:none;user-select:none}
  .grip:hover{color:var(--accent);background:#101114}
  .grip:active{cursor:grabbing}
  .movebtn{position:absolute;top:34px;right:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:13px;cursor:pointer;border-radius:6px;user-select:none}
  .movebtn:hover{color:var(--accent);background:#101114}
  .card .jobno{font-size:11px;color:var(--ink-faint);font-weight:700;letter-spacing:.4px}
  .card .cust{font-weight:700;font-size:14px;margin:2px 0 7px;line-height:1.25}
  .card .meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .chip{background:#0e1216;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:10.5px;color:var(--ink-dim);white-space:nowrap;min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .chip.sys{color:var(--accent)}
  .chip.att{color:var(--blue)}
  .card .money{font-size:13px;color:var(--ink);font-weight:600}
  .card .cover{height:84px;border-radius:8px;background-size:cover;background-position:center;margin-bottom:8px;border:1px solid var(--line)}
  .card .datechip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-faint);margin-top:4px;border-radius:5px;padding:1px 6px;border:1px solid transparent}
  .card .datechip.over{color:#ffd9d6;background:rgba(229,83,75,.18);border-color:rgba(229,83,75,.4)}
  .card .datechip.done{color:#c9f0d0;background:rgba(63,185,80,.15);border-color:rgba(63,185,80,.35)}
  .chip.ck{color:var(--ink-dim)}
  .chip.ck.ok{color:#fff;background:var(--green);border-color:var(--green)}
  .chip.bad{color:#ffd9d6;background:rgba(229,83,75,.18);border-color:rgba(229,83,75,.4)}
  body.theme-light .chip.bad{color:#8f1f18;background:rgba(229,83,75,.14);border-color:rgba(229,83,75,.35)}
  .bar{height:6px;background:#0c1014;border-radius:999px;margin-top:8px;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;background:var(--accent-grad-h)}
  .bar.g > i{background:linear-gradient(90deg,var(--green),#7ee08a)}
  .barlabel{font-size:10px;color:var(--ink-faint);margin-top:4px;display:flex;justify-content:space-between;gap:6px}
  .holdflag{color:var(--amber);font-size:11px;font-weight:700}
  .stagechip{display:inline-block;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
  .moved-badge{display:inline-block;font-size:9px;font-weight:800;color:#10140f;background:var(--amber);border-radius:4px;padding:1px 5px;margin-left:6px;text-transform:uppercase;letter-spacing:.4px}

  .drag-clone{position:fixed;pointer-events:none;z-index:1000;box-shadow:0 14px 34px rgba(0,0,0,.55);transform:rotate(2deg);opacity:.95;margin:0}

  .hint{font-size:12px;color:var(--ink-faint);margin:0 0 12px}
  .pending{margin:0 0 14px;padding:11px 13px;background:#1a1410;border:1px solid #3a2a16;border-left:3px solid var(--amber);border-radius:8px;font-size:12.5px;color:#e7d4b8;line-height:1.7}
  .pending .ph{font-weight:800;color:#fff;display:block;margin-bottom:3px}
  .pending button{margin-left:8px;background:transparent;border:1px solid #5a4420;color:#e7d4b8;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px}
  .pending button:hover{border-color:var(--amber);color:#fff}

  /* TABLE */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px}
  thead th{background:var(--panel);text-align:left;padding:11px 12px;color:var(--ink-dim);font-size:11px;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--line)}
  tbody td{padding:10px 12px;border-bottom:1px solid var(--line)}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--panel)}
  tbody tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid}
  .num{font-variant-numeric:tabular-nums}

  /* CALENDAR */
  .calhead{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .calhead h2{margin:0;font-size:17px}
  .navbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px}
  .navbtn:hover{border-color:var(--accent-dim)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-left:auto;font-size:12px;color:var(--ink-dim)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:10px;height:10px;border-radius:50%;display:inline-block}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.6px;text-align:center;padding-bottom:4px}
  .cell{background:var(--panel);border:1px solid var(--line);border-radius:8px;min-height:74px;padding:6px;position:relative}
  .cell.pad{background:transparent;border-color:transparent}
  .cell .d{font-size:12px;color:var(--ink-faint)}
  .cell.today{border-color:var(--accent)}
  .ev{margin-top:4px;font-size:10px;border-radius:5px;padding:2px 5px;cursor:pointer;color:#0b0e10;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media(max-width:620px){.cell{min-height:54px}.ev{font-size:9px}}

  /* DETAIL DRAWER (Work Order) */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;opacity:0;pointer-events:none;transition:opacity .18s}
  .scrim.show{opacity:1;pointer-events:auto}
  /* work order opens as a centered modal over the board; click the scrim (anywhere
     outside) to dismiss. Mobile: full-height bottom sheet.
     .drawer is only the animated shell — scrolling lives on .dbody: iOS WebKit won't
     reliably touch-scroll a transformed fixed element, and the sheet's height comes
     from insets, not vh (Brave/iOS in-app viewports misreport vh → 2/3-height sheet). */
  .drawer{position:fixed;top:50%;left:50%;height:min(92vh,100%);width:min(880px,94vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;z-index:50;transform:translate(-50%,-44%) scale(.97);opacity:0;pointer-events:none;transition:transform .22s ease,opacity .18s ease;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow)}
  .drawer.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
  @media(max-width:760px){
    .drawer{top:24px;left:0;bottom:0;width:100%;height:auto;border-radius:16px 16px 0 0;transform:translate(0,100%);opacity:1}
    .drawer.show{transform:translate(0,0)}
  }
  .dh{flex:none;background:var(--panel);border-bottom:1px solid var(--line);padding:16px 18px;display:flex;align-items:flex-start;gap:10px;z-index:2}
  .dh .x{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;flex:none}
  .wo{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);font-weight:800}
  .dbody{padding:18px;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  /* condensed glance block — design-card density, house style (Brad 06-12) */
  .glance{border:1px solid var(--line);border-radius:11px;background:var(--panel2);padding:10px 12px;margin-bottom:4px}
  .g-line{font-size:13.5px;margin-bottom:7px;color:var(--ink)}
  .g-sys{display:inline-block;margin-left:6px;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:800;letter-spacing:.4px;color:#fff;background:linear-gradient(90deg,var(--fx-red,#DD5061),var(--fx-magenta,#AB5491),var(--fx-purple,#7A5896));max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom}
  .g-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;font-size:12.5px;color:var(--ink-dim)}
  .g-grid a{color:var(--blue,#58a6ff)}
  .g-dates{grid-column:1 / -1}
  .g-note{margin-top:6px;font-size:11px}
  @media(max-width:620px){.g-grid{grid-template-columns:1fr}}
  /* compact segmented action bar — one unit, not three floating buttons */
  .actions{display:flex;gap:0;margin-bottom:12px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .actions a{flex:1;min-width:0;text-align:center;background:var(--panel2);border:0;border-right:1px solid var(--line);padding:9px 6px;color:var(--ink);font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .actions a:last-child{border-right:0}

  .kv{display:grid;grid-template-columns:130px 1fr;gap:5px 12px;font-size:13.5px}

  .tablewrap.mat{margin:6px 0}

  .mat-confirm{color:#a05a00;background:rgba(227,160,8,.16);border:1px solid rgba(227,160,8,.4);border-radius:5px;padding:1px 6px;font-weight:700;display:inline-block}

  .photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .photos img.photo{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;border:1px solid var(--line);display:block}
  .photoph{aspect-ratio:4/3;background:#0e1216;border:1px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:11px;text-align:center;padding:6px}

</style>

<body>
<header class="top">
  <div class="brand">
    <div class="logo">
      <svg width="26" height="30" viewBox="0 0 26 30" fill="none" aria-hidden="true">
        <path d="M13 1 L24 7.5 L13 14 L2 7.5 Z"  stroke="#DD5061" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M2 14.5 L13 8 L24 14.5 L13 21 Z" stroke="#AB5491" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M2 21.5 L13 15 L24 21.5 L13 28 Z" stroke="#7A5896" stroke-width="2.2" stroke-linejoin="round"/>
      </svg>
      <span class="wordmark">FX COATING</span> <span class="sub">· Field</span>

  <nav class="tabs" id="tabs">

<main id="main"></main>

<!-- Field card overlay (crew bento view, iframe-isolated; also the worker-link artifact) -->

      <button id="fieldcard-copy" onclick="exportFieldCard()" title="Save a self-contained file to share with someone who doesn't have the app">⬇ Save file</button>
      <button onclick="closeFieldCard()">✕ Close</button>
    </div>
  </div>
  <iframe id="fieldcard-frame" title="Field card"></iframe>
</div>

<footer id="footer"></footer>

<script>
/* ============================================================
   FX COATING — PROJECT DASHBOARD (single file, tiny.host-ready)
   Data baked from two sources:
     • fxc-pm vault (live system of record) — JD 2813 (full Work Order)
     • Trello "Post Job" export (fxc-0/intake/post-job.json) — 21 closeout jobs
   Drag the ⠿ grip to move a job between columns. Moves save to this
   browser (localStorage) and are flagged "pending" until synced to the vault.
   Snapshot: 2026-06-09
   ============================================================ */
const SNAPSHOT = "2026-06-09";
const TODAY    = new Date().toLocaleDateString("en-CA"); // YYYY-MM-DD, local — live "today" for calendar + overdue chips

/* theme: ?theme=light|dark wins and persists; DEFAULT = light (Brad, 2026-06-10) */
(function(){
  let t = null;
  try{ t = new URLSearchParams(location.search).get("theme"); if(t) localStorage.setItem("fxc_theme", t); }catch(_){}
  try{ t = t || localStorage.getItem("fxc_theme"); }catch(_){}
  if(t !== "dark"){
    document.body.classList.add("theme-light");
    const m = document.querySelector('meta[name="theme-color"]');
    if(m) m.setAttribute("content", "#edeff3");
  }
})();
const LS_KEY   = "fxc_moves_v1";

/* Vault closeout statuses (SCHEMA.md: invoicing → pja-pending → warranty-issued).
   The old Trello columns (To invoice / Collect product usage / Post job analysis /
   Upload final pictures) were inspiration only — LEGACY_STAGE_MAP folds them in. */
const CLOSEOUT_STAGES = ["Invoicing","PJA Pending","Warranty Issued"];
const LEGACY_STAGE_MAP = {
  "To invoice": "Invoicing",
  "Collect product usage": "PJA Pending",
  "Post job analysis": "PJA Pending",
  "Upload final pictures": "Warranty Issued"
};
const normalizeStage = st => LEGACY_STAGE_MAP[st] || st;

const SOP_POSTJOB = [
  "Complete product usage amounts",
  "Calculate Post Job Analysis (figure out any overage to charge)",
  "Send invoice",
  "Archive project with photos"
];

var JOBS = [];

/* ===================== helpers ===================== */
const BUCKET_META = {
  upcoming:{title:"Upcoming", color:"var(--blue)"},
  active:  {title:"Active",   color:"var(--green)"},
  onhold:  {title:"On Hold",  color:"var(--amber)"},
  closeout:{title:"Closeout", color:"var(--accent)"},
  closed:  {title:"Closed",   color:"var(--grey)"}
};
const BOARD_ORDER = ["upcoming","active","onhold","closeout","closed"];
const money = n => (n==null) ? "—" : new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(n);
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_LONG=["January","February","March","April","May","June","July","August","September","October","November","December"];
function fmtDate(s){ if(!s) return "—"; const[y,m,d]=s.split("-").map(Number); return `${MONTHS[m-1]} ${d}, ${y}`; }
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function checklistProgress(j){
  if(!j.checklists) return null;
  let d=0,t=0;
  for(const k in j.checklists){ d+=j.checklists[k].done; t+=j.checklists[k].total; }
  if(t===0) return null;
  return {done:d,total:t,pct:Math.round(d/t*100)};
}
function cardProgress(j){
  if(j.rich && j.gates){
    const p=j.gates[0]; let d=0,t=0; p.items.forEach(g=>{d+=g.done;t+=g.total;});
    return {label:`${p.name} gates`, done:d, total:t, pct:t?Math.round(d/t*100):0, green:false};
  }
  const cp=checklistProgress(j);
  if(cp) return {label:"checklists", done:cp.done, total:cp.total, pct:cp.pct, green:cp.pct===100};
  return null;
}
function keyDate(j){
  if(j.dates&&j.dates.start) return `Starts ${fmtDate(j.dates.start)}`;
  if(j.dates&&j.dates.requested) return `Requested ${fmtDate(j.dates.requested)}`;
  if(j.dates&&j.dates.deadline) return `Due ${fmtDate(j.dates.deadline)}`;
  return j.period ? `Finished ${j.period}` : "No date set";
}
function statusStyle(j){ const c=BUCKET_META[j.bucket].color; return `color:${c};border-color:${c}`; }
function labelOf(bucket,stage,period){
  if(bucket==="closeout") return "Closeout · "+(stage||"");
  if(bucket==="closed") return "Finished"+(period?(" "+period):"");
  return BUCKET_META[bucket] ? BUCKET_META[bucket].title : bucket;
}

/* ===================== move state (localStorage) ===================== */
let OVERRIDES = {};
function isMoved(j){ return Object.prototype.hasOwnProperty.call(OVERRIDES, j.id); }
function sameState(j,o){
  return o.bucket===j._origBucket && (o.stage||null)===(j._origStage||null) && (o.period||null)===(j._origPeriod||null);
}
function initMoves(){
  JOBS.forEach(j=>{ j._origBucket=j.bucket; j._origStage=j.stage||null; j._origPeriod=j.period||null; });
  try{ OVERRIDES = JSON.parse(localStorage.getItem(LS_KEY)||"{}"); }catch(_){ OVERRIDES={}; }
  for(const id in OVERRIDES){
    const j=JOBS.find(x=>x.id===id);
    if(!j){ delete OVERRIDES[id]; continue; }
    const o=OVERRIDES[id];
    if(sameState(j,o)){ delete OVERRIDES[id]; continue; }   // vault already caught up
    j.bucket=o.bucket; j.stage=o.stage; if("period" in o) j.period=o.period;
  }
  persistMoves();
}
function persistMoves(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(OVERRIDES)); }catch(_){} }
function applyMove(job, ds){
  if(!ds || !ds.bucket) return;
  // lazy snapshot — guards against any path where initMoves() hasn't run yet
  if(job._origBucket===undefined){ job._origBucket=job.bucket; job._origStage=job.stage||null; job._origPeriod=job.period||null; }
  job.bucket = ds.bucket;
  if(ds.bucket==="closeout") job.stage = normalizeStage(ds.stage) || "Invoicing";
  else if(ds.bucket==="closed"){ job.stage="Finished"; if(ds.period) job.period=ds.period; }
  else job.stage = null;
  if(sameState(job, {bucket:job.bucket,stage:job.stage,period:job.period})) delete OVERRIDES[job.id];
  else OVERRIDES[job.id] = {bucket:job.bucket, stage:job.stage||null, period:job.period||null};
  persistMoves();
  render();
}
function resetMoves(){
  OVERRIDES={}; persistMoves();
  // restore ONLY jobs with a real snapshot — never wipe positions to undefined
  JOBS.forEach(j=>{ if(j._origBucket!==undefined){ j.bucket=j._origBucket; j.stage=j._origStage; j.period=j._origPeriod; } });
  render();
}
function pendingPanel(){
  // preview-move bookkeeping is a demo-mode-only concept; live moves commit straight to the vault
  if(window.FXC && FXC.state && FXC.state.mode!=="demo") return "";
  const ids=Object.keys(OVERRIDES);
  if(!ids.length) return "";
  const rows=ids.map(id=>{
    const j=JOBS.find(x=>x.id===id); if(!j) return "";
    const who = (j.jobNumber?("#"+esc(j.jobNumber)+" "):"")+esc(j.customer||j.title);
    return `<div>• <b>${who}</b>: ${esc(labelOf(j._origBucket,j._origStage,j._origPeriod))} → ${esc(labelOf(j.bucket,j.stage,j.period))}</div>`;
  }).join("");
  return `<div class="pending"><span class="ph">${ids.length} preview move${ids.length>1?"s":""} — sandbox only, nothing is written to the vault</span>
    ${rows}
    <div style="margin-top:5px">Once connected, moves commit to the vault the moment you confirm them.<button onclick="resetMoves()">Undo preview moves</button></div></div>`;
}

/* ===================== KPIs ===================== */
function renderKpis(){
  const open = JOBS.filter(j=>j.bucket!=="closed").length;
  const closeout = JOBS.filter(j=>j.bucket==="closeout").length;
  const closed = JOBS.filter(j=>j.bucket==="closed").length;
  const pipeline = JOBS.filter(j=>j.bucket!=="closed").reduce((s,j)=>s+((j.money&&j.money.quote)||0),0);
  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><b>${JOBS.length}</b><span>Projects</span></div>
    <div class="kpi"><b>${open}</b><span>Open</span></div>
    <div class="kpi"><b>${closeout}</b><span>Closeout</span></div>
    <div class="kpi"><b>${closed}</b><span>Finished</span></div>
    <div class="kpi"><b>${money(pipeline)}</b><span>Open value</span></div>`;
}

/* ===================== CARD ===================== */
function dateState(j){
  if(j.bucket==="closed") return "done";
  const d = j.dates && (j.dates.deadline || j.dates.start || j.dates.requested);
  return (d && d < TODAY) ? "over" : "";
}
/* Feature C — the same capture recency as one Board chip, from the shared
   FXC.card.captureState (active-phase jobs only; red only when a reading saved
   today is out of spec). Cannot drift from the card strip — neither stores state. */
function capChip(j){
  if(!window.FXC||!FXC.card||!FXC.card.captureState) return "";
  let cs; try{ cs=FXC.card.captureState(j); }catch(e){ return ""; }
  if(!cs.active) return "";
  if(cs.outOfSpecToday) return `<span class="chip bad" title="A reading saved today is out of spec">⚠ out of spec</span>`;
  if(cs.last&&cs.last.date) return `<span class="chip" title="Last reading ${esc(cs.last.date)}">🖊 last read ${esc(cs.last.date.slice(5))}</span>`;
  return `<span class="chip">no readings</span>`;
}
function cardHTML(j){
  const pr = cardProgress(j);
  const cover = j.cover ? `<div class="cover" style="background-image:url('${esc(j.cover)}')"></div>` : "";
  const sys = j.system ? `<span class="chip sys">${esc(j.system)}</span>` : "";
  const sqft = j.sqft ? `<span class="chip">${j.sqft.toLocaleString()} sqft</span>` : "";
  const att = j.photos ? `<span class="chip att">📷 ${j.photos}</span>` : "";
  const ck = pr ? `<span class="chip ck${pr.pct===100?" ok":""}">☑ ${pr.done}/${pr.total}</span>` : "";
  const stage = (j.bucket==="closeout") ? `<div class="stagechip">${esc(normalizeStage(j.stage))}</div>` : "";
  const money_ = (j.money&&j.money.quote) ? `<div class="money">${money(j.money.quote)}</div>` : "";
  const moved = isMoved(j) ? `<span class="moved-badge">moved</span>` : "";
  const bar = pr ? `<div class="bar${pr.green?" g":""}"><i style="width:${pr.pct}%"></i></div>
      <div class="barlabel"><span>${pr.label}</span><span>${pr.done}/${pr.total}</span></div>` : "";
  return `<div class="card" onclick="cardClick('${j.id}')" onpointerdown="cardDown(event,'${j.id}')">
    <span class="grip" title="Drag to move" onclick="event.stopPropagation()" onpointerdown="gripDown(event,'${j.id}')">⠿</span>
    <span class="movebtn" title="Move to…" onclick="event.stopPropagation();requestMove('${j.id}')">⇅</span>
    ${cover}
    <div class="jobno">${j.jobNumber?("#"+esc(j.jobNumber)):"—"}${j.on_hold?` · <span class="holdflag">ON HOLD</span>`:""}${moved}</div>
    ${stage}
    <div class="cust">${esc(j.customer||j.title)}</div>
    <div class="meta">${sys}${sqft}${ck}${att}${capChip(j)}</div>
    ${money_}
    <div class="datechip ${dateState(j)}">🕒 ${keyDate(j)}</div>
    ${bar}
  </div>`;
}

/* ===================== BOARD ===================== */
/* Roster = booked jobs still at status `won` (not yet being packaged). They wait
   in a slim list left of Upcoming; starting the package (Gate 1 → package-building)
   promotes them onto the board proper. */
function rosterJobs(){ return JOBS.filter(j=>j.status==="won" && !j.on_hold); }
function rosterGate(j){
  const gi = j._meta && j._meta.gateIndex;
  if(!gi) return null;
  let g=null;
  gi.forEach(x=>{ if(!g && /contract\s*binding|^gate\s*1\b/i.test(x.gateName)) g=x; });
  if(!g) return null;
  const done=g.boxes.filter(b=>b.checked).length;
  return {done, total:g.boxes.length, ready: g.boxes.length>0 && done===g.boxes.length};
}
function startPackage(id){
  const j = JOBS.find(x=>x.id===id);
  if(!j) return;
  if(window.FXC && FXC.edit && FXC.edit.confirmAdvance && j._meta) FXC.edit.confirmAdvance(j);
  else if(window.FXC && FXC.edit && FXC.edit.movePicker) FXC.edit.movePicker(j);
}
function toggleRoster(){
  try{ localStorage.setItem("fxc_roster_open", (localStorage.getItem("fxc_roster_open")||"1")==="1"?"0":"1"); }catch(_){}
  render();
}
/* ---- material roll-up across the Upcoming column (Brad 06-12): sum the
   "+25%" order column of every upcoming job's load list, grouped by product ---- */
function matQty(s){
  const m = String(s||"").match(/([\d.,]+)\s*(gal|lbs?|kits?|boxes?|L)\b/i);
  return m ? { n: parseFloat(m[1].replace(/,/g,"")), unit: m[2].toLowerCase().replace(/s$/,"") } : null;
}
function matKey(name){
  const m = String(name).match(/\b(N?\d{3}[A-Z]{0,2})\b/);   // series number, e.g. 288 / 248 / N224
  return m ? m[1] : String(name).split(" - ")[0].trim();
}
function upcomingMaterials(jobs){
  const totals = new Map();
  let covered = 0; const missing = []; let confirms = 0;
  jobs.forEach(j=>{
    const m = j.materials;
    if(!m || !m.rows || !m.rows.length){ missing.push(j); return; }
    covered++;
    const oc = m.header ? m.header.findIndex(h=>/\+\s*25|order/i.test(h)) : 2;
    m.rows.forEach(r=>{
      const cellO = r[oc>=0?oc:2] || "";
      if(/\bCONFIRM\b/.test(cellO)){ confirms++; return; }
      const q = matQty(cellO) || matQty(r[r.length-1]);
      if(!q) return;
      const key = matKey(r[0]);
      const id = key+"|"+q.unit;
      const cur = totals.get(id) || { key, unit:q.unit, n:0, name:String(r[0]).split(" - ")[0].trim(), per:[] };
      cur.n += q.n;
      cur.per.push(`#${j.jobNumber||j.id} ${q.n} ${q.unit}`);
      totals.set(id, cur);
    });
  });
  return { totals:[...totals.values()], covered, missing, confirms, count: jobs.length };
}
function matSummaryHTML(jobs){
  const s = upcomingMaterials(jobs);
  if(!s.count) return "";
  const rows = s.totals.length
    ? s.totals.map(t=>`<tr title="${esc(t.per.join(" · "))}"><td>${esc(t.name)}</td><td class="msq"><b>${Math.round(t.n*10)/10} ${esc(t.unit)}</b></td></tr>
        <tr class="ms-per"><td colspan="2">${esc(t.per.join(" · "))}</td></tr>`).join("")
    : `<tr><td colspan="2" class="ms-empty">No load lists in Upcoming yet.</td></tr>`;
  const flags =
    (s.missing.length ? `<div class="ms-flag">⚑ no load list yet: ${s.missing.map(j=>esc("#"+(j.jobNumber||j.id))).join(", ")}</div>` : "") +
    (s.confirms ? `<div class="ms-flag">⚑ ${s.confirms} CONFIRM line${s.confirms>1?"s":""} not counted</div>` : "");
  return `<details class="mat-sum">
    <summary>Σ Material to order <span class="ms-n">${s.covered}/${s.count} jobs</span></summary>
    <table>${rows}</table>${flags}
    <div class="ms-note">Sums each job's order column (+25%). Roster jobs not included until they start packaging.</div>
  </details>`;
}

/* ===================== CALENDAR ===================== */
const DATE_TYPES=[
  {key:"requested", label:"Requested", color:"var(--accent)"},
  {key:"start",     label:"Start",     color:"var(--green)"},
  {key:"end",       label:"End",       color:"var(--blue)"},
  {key:"deadline",  label:"Due",       color:"var(--red)"}
];
let calYear, calMonth;
function defaultMonth(){
  const [ty,tm]=TODAY.split("-").map(Number);
  const future=[];
  JOBS.forEach(j=>DATE_TYPES.forEach(t=>{ const v=j.dates&&j.dates[t.key]; if(v && v>=TODAY) future.push(v); }));
  future.sort();
  const seed=future[0];
  if(seed){ const[y,m]=seed.split("-").map(Number); calYear=y; calMonth=m-1; }
  else { calYear=ty; calMonth=tm-1; }
}
function eventsFor(y,m){
  const map={};
  JOBS.forEach(j=>DATE_TYPES.forEach(t=>{
    const v=j.dates&&j.dates[t.key]; if(!v) return;
    const[yy,mm,dd]=v.split("-").map(Number);
    if(yy===y && mm-1===m){ (map[dd]=map[dd]||[]).push({job:j,type:t}); }
  }));
  return map;
}
function viewCalendar(){
  if(calYear==null) defaultMonth();
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const ev=eventsFor(calYear,calMonth);
  const[ty,tm,td]=TODAY.split("-").map(Number);
  let cells="";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>cells+=`<div class="dow">${d}</div>`);
  for(let i=0;i<first;i++) cells+=`<div class="cell pad"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=(ty===calYear && tm-1===calMonth && td===d);
    const evs=(ev[d]||[]).map(e=>`<div class="ev" style="background:${e.type.color}" onclick="openJob('${e.job.id}')">${e.job.jobNumber?("#"+esc(e.job.jobNumber)):esc(e.job.title.slice(0,10))} ${e.type.label}</div>`).join("");
    cells+=`<div class="cell${isToday?" today":""}"><div class="d">${d}</div>${evs}</div>`;
  }
  const legend=DATE_TYPES.map(t=>`<span><i style="background:${t.color}"></i>${t.label}</span>`).join("");
  return `<div class="calhead">
      <button class="navbtn" onclick="stepMonth(-1)">‹</button>
      <h2>${MONTHS_LONG[calMonth]} ${calYear}</h2>
      <button class="navbtn" onclick="stepMonth(1)">›</button>
      <div class="legend">${legend}</div></div>
    <div class="cal">${cells}</div>
    <p class="note" style="margin-top:12px">Live jobs need start/end dates set in the vault to populate the timeline — that's the next thing to lock for JD 2813.</p>`;
}
function stepMonth(n){ calMonth+=n; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} render(); }

/* ===================== PIPELINE (the FX Proven Process map) =====================
   The full lifecycle as a flowchart: phases = the vault folders, steps = statuses,
   ⚡ gates between them (from the fxc-brain playbooks / process flowcharts).
   Each open job appears as a chip at its current step. */
const PIPELINE = [
  {phase:"Planning", folder:"10-jobs/1-planning", color:"var(--blue)", steps:[
    {st:"won", gate:"deal won — FXC-3 handoff creates the record"},
    {st:"package-building", gate:"⚡ Gate 1: Contract Binding"},
    {st:"scope-locked", gate:"⚡ Gate 2: Package Ready"},
    {st:"scheduled", gate:"⚡ Gate 3: Scope Locked"},
    {st:"cleared-to-deploy", gate:"⚡ Scheduling complete"}
  ]},
  {phase:"Active", folder:"10-jobs/2-active", color:"var(--green)", steps:[
    {st:"deployed", gate:"mobilization day — crew rolls out"},
    {st:"prepping", gate:"⚡ Cleared to Prep"},
    {st:"applying", gate:"⚡ Cleared to Apply"},
    {st:"destaging", gate:"⚡ Cleared to De-stage"},
    {st:"walkthrough-done", gate:"⚡ Cleared for Walkthrough"}
  ]},
  {phase:"Closeout", folder:"10-jobs/3-closeout", color:"var(--accent)", steps:[
    {st:"invoicing", gate:"⚡ Final Walkthrough"},
    {st:"pja-pending", gate:"⚡ Administrative Complete"},
    {st:"warranty-issued", gate:"⚡ Financial Picture Complete"}
  ]},
  {phase:"Closed", folder:"10-jobs/4-archive", color:"var(--grey)", steps:[
    {st:"closed", gate:"⚡ Job CLOSED — warranty PDF + final invoice cleared"}
  ]}
];
/* "Greg Kustermans" -> "GK" — the chips are too small for names, so they read
   #2822·GK; the full name stays in the tooltip (Brad 2026-07-07) */
function initialsOf(name){
  return String(name||"").trim().split(/[\s\-–—_./]+/)
    .filter(w=>/^[A-Za-z]/.test(w)).slice(0,3)
    .map(w=>w[0].toUpperCase()).join("");
}
function viewPipeline(){
  const SL = (window.FXC && FXC.data && FXC.data.STAGE_LABELS) || {};
  const cols = PIPELINE.map(ph=>{
    const rows = ph.steps.map(s=>{
      const here = JOBS.filter(j=>j.status===s.st);
      const chips = here.map(j=>{
        const ini = initialsOf(j.customer||j.title);
        return `<span class="pl-chip${j.on_hold?" hold":""}" onclick="cardClick('${j.id}')" onpointerdown="plChipDown(event,'${j.id}')" title="${esc(j.customer||j.title)}">#${esc(j.jobNumber)}${ini?`·<span class="ini">${ini}</span>`:""}${j.on_hold?" ⏸":""}</span>`;
      }).join("");
      return `<div class="pl-link">${esc(s.gate)}</div>
        <div class="pl-node" data-status="${esc(s.st)}">${esc(SL[s.st]||s.st)}${chips}</div>`;
    }).join("");
    return `<div class="col"><h3><span class="dot" style="background:${ph.color}"></span>${ph.phase}<span class="count">${esc(ph.folder)}</span></h3>${rows}</div>`;
  }).join("");
  return `<p class="hint">The FX Proven Process — every job walks this exact path. A ⚡ gate must be 100% checked before the next step unlocks (the same gates as each job's checklists, straight from the fxc-brain playbooks). Jobs appear as chips at their current step — tap one to open it · drag it to another step to move it (long-press to lift on a phone); every move confirms its gates before anything is written.</p>
    <div class="cols b4">${cols}</div>`;
}

/* ===================== DRAG & DROP (pointer events — mouse + touch) ===================== */
let drag=null, press=null, suppressClickUntil=0;
function beginDrag(e, cardEl, job){
  const rect = cardEl.getBoundingClientRect();
  const clone = cardEl.cloneNode(true);
  clone.classList.add("drag-clone");
  clone.classList.remove("dragging");
  clone.style.width = rect.width+"px";
  clone.style.left = rect.left+"px";
  clone.style.top  = rect.top+"px";
  document.body.appendChild(clone);
  cardEl.classList.add("dragging");
  drag = { job, cardEl, clone, offX:e.clientX-rect.left, offY:e.clientY-rect.top, lastCol:null };
  try{ cardEl.setPointerCapture(e.pointerId); }catch(_){}
  moveCloneTo(e.clientX, e.clientY);
}
function gripDown(e, id){
  e.preventDefault(); e.stopPropagation();
  if(e.button && e.button!==0) return;
  const cardEl = e.currentTarget.closest(".card");
  const job = JOBS.find(x=>x.id===id);
  if(!cardEl || !job) return;
  beginDrag(e, cardEl, job);
}
/* whole-card interactions: mouse-drag from anywhere on the card; touch long-press
   opens the move picker (a physical touch-drag would fight column scrolling);
   a plain tap/click still opens the work-order drawer. */
function cardDown(e, id){
  if(e.button && e.button!==0) return;
  if(e.target.closest(".grip,.movebtn")) return; // those have their own behavior
  const cardEl = e.currentTarget;
  if(e.pointerType==="mouse"){
    press = { id, cardEl, sx:e.clientX, sy:e.clientY, type:"mouse" };
  } else {
    press = { id, cardEl, sx:e.clientX, sy:e.clientY, type:"touch",
      timer: setTimeout(()=>{ press=null; suppressClickUntil=Date.now()+450;
        if(navigator.vibrate) try{navigator.vibrate(12);}catch(_){}
        requestMove(id); }, 380) };
  }
}
/* pipeline chips: mouse-drag from anywhere on the chip; touch long-press LIFTS
   the chip for dragging (touch-action:none on .pl-chip keeps the browser from
   stealing the gesture for scrolling); a plain tap still opens the job. */
function plChipDown(e, id){
  if(e.button && e.button!==0) return;
  const chipEl = e.currentTarget;
  const job = JOBS.find(x=>x.id===id);
  if(!job) return;
  if(e.pointerType==="mouse"){
    press = { id, cardEl:chipEl, sx:e.clientX, sy:e.clientY, type:"mouse" };
  } else {
    press = { id, cardEl:chipEl, sx:e.clientX, sy:e.clientY, type:"touch",
      timer: setTimeout(()=>{ press=null; suppressClickUntil=Date.now()+450;
        if(navigator.vibrate) try{navigator.vibrate(12);}catch(_){}
        beginDrag(e, chipEl, job); }, 380) };
  }
}
function clearPress(){ if(press){ if(press.timer) clearTimeout(press.timer); press=null; } }
function cardClick(id){ if(Date.now()<suppressClickUntil) return; openJob(id); }
function moveCloneTo(x,y){ if(drag&&drag.clone){ drag.clone.style.left=(x-drag.offX)+"px"; drag.clone.style.top=(y-drag.offY)+"px"; } }
function highlight(x,y){
  const el=document.elementFromPoint(x,y);
  const col=el?(el.closest(".pl-node[data-status]")||el.closest(".col[data-status]")||el.closest(".col[data-bucket]")):null;
  if(col!==drag.lastCol){
    if(drag.lastCol) drag.lastCol.classList.remove("drop-target");
    if(col) col.classList.add("drop-target");
    drag.lastCol=col;
  }
}
document.addEventListener("pointermove", e=>{
  if(press){
    const dist = Math.hypot(e.clientX-press.sx, e.clientY-press.sy);
    if(dist > 7){
      const p = press; clearPress();
      if(p.type==="mouse"){
        const job = JOBS.find(x=>x.id===p.id);
        if(job){ suppressClickUntil = Date.now()+450; beginDrag(e, p.cardEl, job); }
      }
      // touch: movement = the user is scrolling — let the browser have it
    }
  }
  if(!drag) return;
  e.preventDefault();
  moveCloneTo(e.clientX, e.clientY);
  highlight(e.clientX, e.clientY);
}, {passive:false});
function endDrag(commit){
  if(!drag) return;
  const d=drag; drag=null;
  if(d.clone) d.clone.remove();
  if(d.cardEl) d.cardEl.classList.remove("dragging");
  document.querySelectorAll(".col.drop-target,.pl-node.drop-target").forEach(c=>c.classList.remove("drop-target"));
  if(commit && d.lastCol && d.lastCol.dataset.status){
    // pipeline step node — an EXACT status target, not a bucket column
    const st = d.lastCol.dataset.status;
    if(window.FXC && FXC.edit && FXC.edit.handleStatusDrop && FXC.edit.handleStatusDrop(d.job, st)) return;
    applyStatusMove(d.job, st);
    return;
  }
  if(commit && d.lastCol && d.lastCol.dataset.bucket){
    const ds = { bucket:d.lastCol.dataset.bucket, stage:d.lastCol.dataset.stage, period:d.lastCol.dataset.period };
    // live vault jobs: gated move via the confirm popup (edit.js); demo/history: v1 sandbox
    if(window.FXC && FXC.edit && FXC.edit.handleDrop && FXC.edit.handleDrop(d.job, ds)) return;
    applyMove(d.job, ds);
  }
}
/* sandbox fallback (demo/history cards): reposition the chip locally, mirroring
   the status onto the v1 bucket/stage so Board/Closeout agree with the chip */
function applyStatusMove(job, st){
  job.status = st;
  const D = window.FXC && FXC.data;
  const b = D && D.STATUS_BUCKET ? D.STATUS_BUCKET[st] : null;
  if(b) applyMove(job, b==="closeout" ? {bucket:b, stage:(D.STAGE_LABELS||{})[st]} : {bucket:b});
  else render();
}
function requestMove(id){
  const j = JOBS.find(x=>x.id===id);
  if(j && window.FXC && FXC.edit && FXC.edit.movePicker) FXC.edit.movePicker(j);
}
document.addEventListener("pointerup", ()=>{ clearPress(); if(drag) suppressClickUntil=Date.now()+450; endDrag(true); });
document.addEventListener("pointercancel", ()=>{ clearPress(); endDrag(false); });

/* ===================== DETAIL (Work Order) ===================== */
/* One renderer for every parsed vault table section ({header, rows, notes?}).
   CONFIRM cells flag numbers a human still owes; **bold** markdown renders.
   opts: cls (extra tablewrap class) · notesLabel (collapsed notes summary) ·
   empty (line shown when the section exists but has no rows yet). Null-safe:
   a job without the section (sparse 2769 shape) renders nothing. */
function tableHTML(title, t, opts){
  opts = opts || {};
  if(!t || (!(t.rows||[]).length && !t.notes && !opts.empty)) return "";
  const cell = c => /\bCONFIRM\b/.test(c)
    ? `<span class="mat-confirm">${esc(c)}</span>`
    : esc(c).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");
  const table = (t.rows||[]).length ? `<div class="tablewrap${opts.cls?" "+opts.cls:""}"><table>
      <thead><tr>${(t.header||[]).map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead>
      <tbody>${t.rows.map(r=>`<tr>${r.map(c=>`<td>${cell(c)}</td>`).join("")}</tr>`).join("")}</tbody>
    </table></div>` : `<p class="note">${esc(opts.empty||"")}</p>`;
  const notes = t.notes ? `<details class="sop mat-math"><summary>${opts.notesLabel||"Notes"}</summary><p>${cell(t.notes)}</p></details>` : "";
  return `<h4>${title}</h4>${table}${notes}`;
}
/* Material load list — calculated by the material-calculator agent into the job
   file's ## Materials section; crew-visible (it IS the truck-loading answer). */
function materialsHTML(j){
  return tableHTML("🧱 Material load list", j.materials,
    {cls:"mat", notesLabel:"The math, caveats &amp; ordering notes"});
}
/* Readings + Product-usage capture tables — the read side of the field-capture
   loop (ghost form / drawer forms write them). Claims the queued POLISH item
   "Drawer: show the Readings / Product-usage capture tables". */
function captureTablesHTML(j){

/* Documents & links — rendered from the record's ## Links bullets (PDS refs etc.);
   http(s) targets are clickable, Sync paths show as labeled paths */
function docLinksHTML(j){
  if(j.linksList && j.linksList.length){
    const ic = L => /maps/i.test(L.label) ? "🗺️" : /folder/i.test(L.label) ? "🗂️"
      : /discord/i.test(L.label) ? "💬" : /pds|sds|quote|manual/i.test(L.label) ? "📄" : "🔗";
    let rows = j.linksList.map(L => L.url
      ? `<a href="${esc(L.target)}" target="_blank" rel="noopener">${ic(L)} ${esc(L.label)}</a>`

      rows += `<span style="color:var(--ink-faint)">💬 Discord job thread — to be created</span>`;

    <span style="color:var(--ink-faint)">💬 Discord job thread — to be created</span>`;

/* Condensed gate progress: a "now" line + one bar per phase, with the full
   per-gate list tucked behind a collapsed "All gates" (Brad 2026-07-02: the
   13-gate list took too much space and told him nothing at a glance). */
function gateProgress(j){
  const phases=(j.gates||[]).map(p=>{
    let done=0,total=0; (p.items||[]).forEach(g=>{done+=g.done;total+=g.total;});
    return {name:p.name, items:p.items||[], done, total};
  });
  // phases with no gates in the file are collapsed (backfilled records fold
  // planning+active into a one-line stamp; only closeout is worked live)
  const shown = phases.filter(p=>p.items.length>0);
  const collapsed = phases.filter(p=>p.items.length===0);
  if(!shown.length) return `<p class="note">No gate checklists on this record.</p>`;
  let now=null;
  for(const p of shown){ for(const g of p.items){ if(g.done<g.total){ now={phase:p.name,gate:g.name}; break; } } if(now) break; }
  const nowLine = now
    ? `<div class="gp-now"><span class="gp-ph">${esc(now.phase)}</span> · working <b>${esc(now.gate)}</b></div>`
    : `<div class="gp-now gp-done">✓ All gates complete</div>`;
  const stamp = collapsed.length
    ? `<div class="gp-stamp">${esc(collapsed.map(p=>p.name).join(" + "))} — completed pre-PM (backfilled)</div>`
    : "";
  const bars = shown.map(p=>{
    const pct=p.total?Math.round(p.done/p.total*100):0;
    const full=p.total>0 && p.done===p.total; const on=now && now.phase===p.name;
    return `<div class="gate gp-phase${on?" on":""}"><div class="gl"><b>${esc(p.name)}</b><span class="gp ${full?"done":""}">${p.done}/${p.total}</span></div>
      <div class="bar${full?" g":""}"><i style="width:${pct}%"></i></div></div>`;
  }).join("");
  const count=shown.reduce((n,p)=>n+p.items.length,0);
  const all=shown.map(p=>`
    <div class="gphase">${esc(p.name)}</div>
    ${p.items.map(g=>{ const pct=g.total?Math.round(g.done/g.total*100):0; const full=g.total>0&&g.done===g.total;
      return `<div class="gate"><div class="gl"><b>${esc(g.name)}</b><span class="gp ${full?"done":""}">${g.done}/${g.total}</span></div>
        <div class="bar${full?" g":""}"><i style="width:${pct}%"></i></div></div>`; }).join("")}`).join("");
  return `${nowLine}${stamp}${bars}<details class="gp-all"><summary>All ${count} gates</summary>${all}</details>`;
}

/* ===================== FIELD CARD (crew bento, iframe-isolated) ===================== */
let _fcJob=null;
function openFieldCard(id){
  const j=JOBS.find(x=>x.id===id); if(!j||!window.FXC||!FXC.card) return;
  _fcJob=j;
  const host=document.getElementById("fieldcard");
  const frame=document.getElementById("fieldcard-frame");
  frame.srcdoc=FXC.card.doc(j);
  // dated who/when for the Site Wire: one read-only commits-page fetch, then
  // re-render in place (demo/offline/failure resolve null → the derived
  // milestones stand); refreshFieldCard keeps the reader's scroll position
  if(!j.history && FXC.data && FXC.data.loadHistory){
    FXC.data.loadHistory(j).then(h=>{ if(h&&_fcJob===j){ j.history=h; refreshFieldCard(j); } });
  }
  document.getElementById("fieldcard-title").textContent="Field card · #"+(j.jobNumber||j.id);
  host.classList.add("show");
  // shareable URL while a card is open (replaceState: no history spam, no hashchange echo)
  if(history.replaceState) history.replaceState(null,"","#card="+encodeURIComponent(j.jobNumber||j.id));
}
function closeFieldCard(){
  document.getElementById("fieldcard").classList.remove("show");
  document.getElementById("fieldcard-frame").srcdoc="";
  if(/#card=/.test(location.hash)&&history.replaceState) history.replaceState(null,"",location.pathname+location.search);
}
/* app-glue calls this after an offline-queue flush lands: re-render the OPEN
   card so the Site Wire shows the synced rows and the pending badge clears */
function refreshOpenFieldCard(){
  const host=document.getElementById("fieldcard");
  if(!host||!host.classList.contains("show")||!_fcJob) return;
  const fresh=(window.JOBS||[]).find(x=>x.id===_fcJob.id)||_fcJob;
  if(fresh!==_fcJob&&!fresh.history&&_fcJob.history) fresh.history=_fcJob.history;
  _fcJob=fresh;
  refreshFieldCard(_fcJob);
}
/* Re-render the open card without losing the reader's place: a srcdoc swap is a
   brand-new document at scroll 0 (srcdoc iframes are same-origin, so the offset
   is readable and restorable once the fresh document loads). */
function refreshFieldCard(j){
  const frame=document.getElementById("fieldcard-frame");
  let y=0; try{ y=frame.contentWindow.document.scrollingElement.scrollTop; }catch(e){}
  if(y) frame.addEventListener("load",()=>{ try{ frame.contentWindow.scrollTo(0,y); }catch(e){} },{once:true});
  frame.srcdoc=FXC.card.doc(j);
}
/* the "⧉ Copy link" share path: the URL opens this card in the app on any connected
   phone (app-glue consumes #card= after jobs load). Clipboard API needs https/localhost
   — matches everywhere the app is served; execCommand covers older WebKit. */
function copyFieldCardLink(){
  const j=_fcJob; if(!j) return;
  // &crew=1: the receiving device becomes crew-only — worker links can never
  // hand out Brad/Dan on the role picker (Brad 2026-07-03)
  const url=location.origin+location.pathname+location.search+"#card="+encodeURIComponent(j.jobNumber||j.id)+"&crew=1";
  const btn=document.getElementById("fieldcard-link"); const label=btn?btn.textContent:"";
  const done=ok=>{ if(btn){ btn.textContent=ok?"✓ Copied":"Copy failed"; setTimeout(()=>{ btn.textContent=label; },1600); } };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(()=>done(true),()=>done(false)); }
  else{ const ta=document.createElement("textarea"); ta.value=url; document.body.appendChild(ta); ta.select();
    let ok=false; try{ ok=document.execCommand("copy"); }catch(e){} ta.remove(); done(ok); }
}
/* pasting/tapping a #card= link while the app is already open */
window.addEventListener("hashchange",()=>{
  const m=/[#&]card=([^&]+)/.exec(location.hash||""); if(!m) return;
  const v=decodeURIComponent(m[1]);
  const j=(window.JOBS||[]).find(x=>String(x.jobNumber)===v||String(x.id)===v);
  if(j) openFieldCard(j.id);
});

/* Ghost-Row Capture plumbing: the field-card iframe posts one row per Save; hand it
   to the EXISTING engine (appendReading/appendProduct via edit.commit) — one row =
   one single-line role-stamped commit. The form stays open for fluid back-to-back
   entry; we refresh the card's srcdoc only when it closes so the Site Wire + strip
   (and, via replaceJob's re-render, the Board chip) catch up. */
window.addEventListener("message", function(e){
  const d = e && e.data; if(!d || !d.fxc) return;
  const frame = document.getElementById("fieldcard-frame");
  if(!frame || e.source !== frame.contentWindow) return;      // only our field card
  if(d.fxc === "capture-close"){ if(_fcJob) refreshFieldCard(_fcJob); return; }
  if(d.fxc !== "capture") return;
  const ack = (ok, err, queued) => { try{ frame.contentWindow.postMessage({fxc:"capture-ack", id:d.id, ok:ok, err:err, queued:!!queued}, "*"); }catch(e){} };
  // the iframe is waiting on an ack — never leave it hanging on a guard exit
  if(!window.FXC || !FXC.edit){ ack(false, "the app isn't ready — reload and retry."); return; }
  if(!_fcJob){ ack(false, "no job is open — reload the card."); return; }
  const row = d.row || {};
  const usage = (d.kind === "usage" || d.kind === "batch");
  const fn = function(job){
    const r = usage ? FXC.data.appendProduct(job, row) : FXC.data.appendReading(job, row);
    r._origPath = job._meta.path; return r;
  };
  // serialize saves so a back-to-back save always starts from the refreshed job
  // (no self-conflict 409s), and ack the iframe only once the commit settles.
  // queueRow opts the capture kinds into the offline queue: a dead-signal save
  // comes back ok+queued (amber ack) instead of a red failure.
  window._fcQueue = (window._fcQueue || Promise.resolve()).then(function(){
    let queued = false;
    return Promise.resolve(FXC.edit.commit(_fcJob, fn, usage ? "product" : "reading", {
      queueRow: row, onQueued: function(){ queued = true; }
    })).then(function(ok){
      if(ok !== false && !queued){
        const fresh = (window.JOBS || []).find(x => x.id === _fcJob.id) || _fcJob;
        // carry the fetched Site Wire history across the post-capture re-parse
        if(fresh !== _fcJob && !fresh.history && _fcJob.history) fresh.history = _fcJob.history;
        _fcJob = fresh;
      }
      ack(ok !== false, ok === false ? "the app refused or the write failed (see the app banner)." : undefined, queued);
    }, function(err){
      ack(false, (err && err.message) || "write failed.");
    });
  });
});

/* Export the field card as a single self-contained HTML file (photos inlined as
   base64 so it works anywhere — Sync share, email, double-click). The no-app share
   path; connected phones get the live #card= deep link via "⧉ Copy link" above. */
function toDataUri(url){
  return fetch(url).then(r=>r.blob()).then(b=>new Promise(res=>{
    const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=()=>res(url); fr.readAsDataURL(b);
  })).catch(()=>url); // fall back to the original path if fetch is blocked (file://)
}
async function exportFieldCard(){
  const j=_fcJob; if(!j||!window.FXC||!FXC.card) return;
  const btn=document.getElementById("fieldcard-copy"); const label=btn?btn.textContent:"";
  if(btn){ btn.textContent="… building"; btn.disabled=true; }
  let urls=j.photoUrls||[]; let inlined=urls;
  try{ inlined=await Promise.all(urls.map(toDataUri)); }catch(e){}
  const allInlined=inlined.every(u=>/^data:/.test(u));
  const jc=Object.assign({},j,{photoUrls:inlined,cover:inlined[0]});
  const html=FXC.card.doc(jc);
  const blob=new Blob([html],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=(j.jobNumber||"job")+"-field-card.html";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  if(btn){ btn.textContent=label; btn.disabled=false; }
  if(FXC.app&&FXC.app.toast) FXC.app.toast(
    allInlined ? "Worker card saved — share it via Sync or open in any browser."
               : "Saved (photos not embedded — open the app over http to inline them).",
    allInlined?"ok":"info");
}
